name: flood_forecast_bd_app
description: "AI-Powered Flood Forecasting for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  provider: ^6.1.2
  flutter_markdown: ^0.7.4+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon_dark.png
    - assets/images/icon_light.png
